<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>WD page</title>
    </head>
    <body>
        
        <a href="#main-content" class="skiplink">Skip to main content</a>

        <header>
            <h1>My page</h1>
        </header>
        
        <nav aria-label="Main navigation">
            <ul>
                <li>
                    <a href="index.html">Homepage</a>
                </li>
            </ul>
        </nav>


        <main id="main-content">
            <h2>Form</h2>
            <section>
                <form method="post" action="#" aria-label="Contact form">
                    <fieldset>
                        <legend>Your details</legend>
                        <label for="name">Full name (required)</label>
                        <input type="text" id="name" name="name" required>
                        <label for="email">Email (required)</label>
                        <input type="email" id="email" name="email" required>
                        <label for="phone">Phone (optional)</label>
                        <input type="tel" id="phone" name="phone"
                            pattern="[0-9\s\-+]+" title="Digits, spaces, hyphens, or plus only">
                    </fieldset>

                    <fieldset>
                        <legend>Your message</legend>
                        <label for="subject">Subject (required)</label>
                        <input type="text" id="subject" name="subject" required
                            aria-describedby="subject-hint">
                        <p id="subject-hint" class="form-hint">
                            e.g. Complaints, suggestions, ideas
                        </p>
                        <label for="msg">Message (required)</label>
                        <textarea id="msg" name="message" rows="3" required></textarea>
                    </fieldset>

                    <fieldset>
                    <legend>Overall, how satisfied were you with your experience today?</legend>
                        <label for="satisfiability-vs">Very satisfied</label>
                        <input type="radio" id="satisfiability-vs" name="satisfiability" value="vs" required>
                        <label for="satisfiability-ss">Somewhat satisfied</label>
                        <input type="radio" id="satisfiability-ss" name="satisfiability" value="ss">
                        <label for="satisfiability-n">Neutral</label>
                        <input type="radio" id="satisfiability-n" name="satisfiability" value="n">
                        <label for="satisfiability-u">Unsatisfied</label>
                        <input type="radio" id="satisfiability-u" name="satisfiability" value="u">
                    </fieldset>

                    <button type="submit">Send message</button>
                </form>
            </section>
        </main>

        <footer>
            <p>Petcovici Eduard-Mihai, Web Design 2026</p>
        </footer>

    </body>
</html>
